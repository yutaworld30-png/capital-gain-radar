name: Update data and deploy Pages

on:
  workflow_dispatch:
  schedule:
    # 16:10 JST on weekdays. GitHub Actions schedules use UTC.
    - cron: "10 7 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Refresh market data
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          EDINET_MAX_DOWNLOADS: "225"
        run: python work/fetch_official_data.py

      - name: Refresh market environment
        run: python work/market_environment.py

      - name: Validate generated stock data
        run: python work/validate_output.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
