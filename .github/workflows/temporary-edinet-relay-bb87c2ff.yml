name: Temporary encrypted EDINET relay bb87c2ff

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  encrypt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Encrypt EDINET API key
        shell: bash
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          PUBLIC_KEY_B64: 
        run: |
          set -euo pipefail
          test -n "$EDINET_API_KEY"
          printf '%s' "$PUBLIC_KEY_B64" | base64 --decode > public.pem
          printf '%s' "$EDINET_API_KEY" | openssl pkeyutl -encrypt -pubin -inkey public.pem -pkeyopt rsa_padding_mode:oaep -pkeyopt rsa_oaep_md:sha256 -pkeyopt rsa_mgf1_md:sha256 -out edinet-api-key.enc
          rm -f public.pem
      - name: Upload encrypted artifact
        uses: actions/upload-artifact@v4
        with:
          name: edinet-secret-bb87c2ff
          path: edinet-api-key.enc
          retention-days: 1
          if-no-files-found: error
